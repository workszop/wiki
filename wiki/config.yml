port: 3000
bindIP: 0.0.0.0
logLevel: info

db:
  type: postgres
  host: db
  port: 5432
  user: wiki
  pass: $(DB_PASSWORD)
  db: wiki
  ssl: false

uploads:
  maxFileSize: 10485760  # 10 MB
  maxFiles: 20

auth:
  strategies:
    - key: local
      title: Konto demo
      enabled: true
      selfRegistration: false  # only preseeded demo account
    - key: oidc
      title: Microsoft 365
      enabled: true
      selfRegistration: false  # users must exist in Entra ID groups
      config:
        issuer: https://login.microsoftonline.com/$(AZURE_TENANT_ID)/v2.0
        authorizationURL: https://login.microsoftonline.com/$(AZURE_TENANT_ID)/oauth2/v2.0/authorize
        tokenURL: https://login.microsoftonline.com/$(AZURE_TENANT_ID)/oauth2/v2.0/token
        userInfoURL: https://graph.microsoft.com/oidc/userinfo
        clientId: $(AZURE_CLIENT_ID)
        clientSecret: $(AZURE_CLIENT_SECRET)
        callbackURL: https://$(PUBLIC_DOMAIN)/login/oidc/callback
        scope: openid profile email groups
        groupsClaim: groups
        mapGroups:
          # Map Entra ID Group GUIDs to Wiki.js group names
          # Replace GUIDs with actual values from Entra ID
          "00000000-0000-0000-0000-000000000001": "Administrators"
          "00000000-0000-0000-0000-000000000002": "Editors"
          "00000000-0000-0000-0000-000000000003": "Contributors"
          "00000000-0000-0000-0000-000000000004": "Readers"

search:
  # Phase 1–5: Postgres FTS with polish dictionary
  # Decision gate week 6: evaluate Manticore if p95 > 500ms at 10K articles
  provider: postgres
  config:
    dictLanguage: polish

locale:
  primary: pl
  autoUpdate: true

mail:
  relay:
    host: $(SMTP_HOST)
    port: $(SMTP_PORT)
    user: $(SMTP_USER)
    pass: $(SMTP_PASS)
    from: $(SMTP_FROM)
    secure: false
